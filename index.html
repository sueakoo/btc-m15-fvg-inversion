<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC M15 FVG Inversion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <div class="header">
    <h1>BTC M15 FVG Inversion Analyzer</h1>
    <p>Вставьте данные свечей из X-RAY и нажмите Анализ</p>
  </div>

  <div class="input-grid">
    <div class="input-block">
      <label>M15 свечи</label>
      <textarea id="m15Input" placeholder="ts: 15.06.2026 17:15&#10;exchange: Binance&#10;symbol: BTCUSDT Perp&#10;tf: 15m&#10;open: 75635.60&#10;high: 75680.10&#10;low: 75590.20&#10;close: 75660.40&#10;..."></textarea>
    </div>
    <div class="input-block">
      <label>H1 свечи</label>
      <textarea id="h1Input" placeholder="ts: 15.06.2026 17:00&#10;exchange: Binance&#10;symbol: BTCUSDT Perp&#10;tf: 1h&#10;open: 75500.00&#10;..."></textarea>
    </div>
  </div>

  <button class="btn-analyze" onclick="runAnalysis()">Анализ</button>

  <div class="errors" id="errors"></div>

  <div class="report" id="report">
    <div class="debug-out" id="debugOut"></div>
  </div>

</div>

<script src="js/parser.js"></script>
<script src="js/detection.js"></script>
<script src="js/metrics.js"></script>
<script src="js/scoring.js"></script>
<script>
  function runAnalysis() {
    const m15Text = document.getElementById('m15Input').value;
    const h1Text  = document.getElementById('h1Input').value;

    const errorsEl = document.getElementById('errors');
    const reportEl = document.getElementById('report');
    const debugEl  = document.getElementById('debugOut');

    errorsEl.classList.remove('visible');
    reportEl.classList.remove('visible');

    const parsed = parseInput(m15Text, h1Text);

    if (parsed.errors.length > 0) {
      errorsEl.innerHTML = parsed.errors.map(e => `<p>⚠ ${e}</p>`).join('');
      errorsEl.classList.add('visible');
      return;
    }

    const det = detect(parsed.m15);

    if (!det.ok) {
      errorsEl.innerHTML = det.errors.map(e => `<p>⚠ ${e}</p>`).join('');
      errorsEl.classList.add('visible');
      return;
    }

    const mx  = computeMetrics(parsed.m15, parsed.h1, det);
    const sc  = computeScore(parsed.m15, parsed.h1, det, mx);

    const b = sc.blocks;
    const out = {
      '═══ ИТОГ ═══':         null,
      ВЕРДИКТ:                sc.verdict,
      БАЛЛ:                   `${sc.total} / 100`,
      стоп_флаги:             sc.stopFlags,
      красные_флаги:          sc.redFlags,
      ожидаемый_тест:         `${sc.expectedTest.level} — ${sc.expectedTest.range}`,

      '─── БЛОКИ ───':        null,
      'Б1 Energy':            `${b.block1.score}/14  ${b.block1.label}`,
      'Б2 OI Placement':      `${b.block2.score}/11  ${b.block2.label}`,
      'Б3 OI Retention':      `${b.block3.score}/13  ${b.block3.label}`,
      'Б4 Механика захвата':  `${b.block4.score}/16  ${b.block4.label}`,
      'Б5 Re-Auction':        `${b.block5.score}/13  ${b.block5.label}`,
      'Б6 Geometry':          `${b.block6.score}/8   ${b.block6.label}`,
      'Б8 Skew':              `${b.block8.score}/7   ${b.block8.label}`,
      'Б9 H1 Snapshot':       `${b.block9.score}/18  ${b.block9.label}`,

      '─── ДЕТАЛИ ───':       null,
      direction:              det.direction,
      fvg:                    `${det.fvg.lower_fvg} – ${det.fvg.upper_fvg}  (${det.fvg.imb_range_pct}%)`,
      pivot:                  `${det.pivot.ts}  low=${det.pivot.value}`,
      inversion:              `${det.inversion.ts}  close=${det.inversion.close}`,
      skew_depth:             det.skew_depth,
      gross_oi:               mx.gross_oi,
      net_oi:                 mx.net_oi,
      retention_ratio:        mx.retention_ratio,
      share_below_fvg:        `${mx.share_below} + ${mx.share_fvg} = ${((mx.share_below??0)+(mx.share_fvg??0)).toFixed(3)}`,
      fvg_volume_share:       mx.fvg_volume_share,
      h1_doi:                 mx.h1_doi_pct,
      h1_liqshare:            mx.h1_liqshare_pct,
    };

    debugEl.textContent = JSON.stringify(out, null, 2);
    reportEl.classList.add('visible');
  }
</script>

</body>
</html>
