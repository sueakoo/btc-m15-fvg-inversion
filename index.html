<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC M15 FVG Inversion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <h1>BTC M15 FVG Inversion Analyzer</h1>
      <div style="display:flex;gap:8px">
        <button class="btn-export" id="btnSetups" onclick="openSetupsModal()">Сетапы (0)</button>
        <button class="btn-export" id="btnExport" onclick="exportSetups()">Экспорт (0)</button>
      </div>
    </div>
    <p>Вставьте данные свечей из X-RAY и нажмите Анализ</p>
  </div>

  <div class="input-grid">
    <div class="input-block">
      <label>M15 свечи</label>
      <textarea id="m15Input" placeholder="ts: 15.06.2026 17:15&#10;open: 75635.60&#10;high: 75680.10&#10;low: 75590.20&#10;close: 75660.40&#10;doi_pct: 0.14%&#10;..."></textarea>
    </div>
    <div class="input-block">
      <label>H1 свечи</label>
      <textarea id="h1Input" placeholder="ts: 15.06.2026 17:00&#10;open: 75500.00&#10;doi_pct: 0.22%&#10;liqshare_pct: 3.5%&#10;..."></textarea>
    </div>
  </div>

  <button class="btn-analyze" onclick="runAnalysis()">Анализ</button>

  <div class="errors" id="errors"></div>
  <div class="report" id="report"></div>

</div>

<!-- ── Save Modal ── -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-title">Сохранить сетап</div>
    <div class="modal-field">
      <label>Исход</label>
      <select id="saveOutcome" onchange="onOutcomeChange()">
        <option value="">— выберите —</option>
        <option value="тейк">Тейк</option>
        <option value="стоп">Стоп</option>
      </select>
    </div>
    <div class="modal-field" id="saveRRRow" style="display:none">
      <label>R/R</label>
      <input type="text" id="saveRR" placeholder="например 1:1.5">
    </div>
    <div class="modal-field">
      <label>Старший контекст</label>
      <select id="saveSeniorCtx">
        <option value="">— выберите —</option>
        <option value="есть">Есть старший контекст</option>
        <option value="нет">Нет старшего контекста</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Реальная глубина теста</label>
      <select id="saveTestDepth">
        <option value="">— выберите —</option>
        <option value="Мелкий">Мелкий</option>
        <option value="Средний">Средний</option>
        <option value="Глубокий">Глубокий</option>
        <option value="К Pivot">К Pivot</option>
        <option value="Провал">Провал</option>
        <option value="Без теста">Без теста</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Заметка</label>
      <textarea id="saveNotes" rows="2" placeholder="необязательно"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeSaveModal()">Отмена</button>
      <button class="btn-modal-confirm" onclick="confirmSave()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ── Setups Modal ── -->
<div class="modal-overlay" id="setupsModal">
  <div class="modal modal-wide">
    <div class="modal-title" id="setupsModalTitle">Сохранённые сетапы</div>
    <div class="setups-list" id="setupsList"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeSetupsModal()">Закрыть</button>
      <button class="btn-delete-all" id="btnDeleteAll" onclick="deleteAllSetups()">Удалить все</button>
    </div>
  </div>
</div>

<script src="js/parser.js"></script>
<script src="js/detection.js"></script>
<script src="js/metrics.js"></script>
<script src="js/scoring.js"></script>
<script>

// ── Последний анализ (для сохранения) ────────────────────────
let _lastSc = null, _lastDet = null, _lastMx = null;

// ── Цвета ─────────────────────────────────────────────────────
const VERDICT_COLORS = {
  'Сильный сетап':       '#2ea043',
  'Рабочий сетап':       '#3fb950',
  'Стандартная инверсия':'#d4a017',
  'Ослабленная инверсия':'#e38a11',
  'Не брать':            '#c0392b',
};

function scoreColor(score, max) {
  const p = score / max;
  if (p >= 0.70) return '#2ea043';
  if (p >= 0.40) return '#d4a017';
  return '#c0392b';
}

const TEST_COLORS = {
  'Мелкий':       '#2ea043',
  'Средний':      '#d4a017',
  'Глубокий':     '#e38a11',
  'К Pivot':      '#c0392b',
  'Риск провала': '#c0392b',
};

function chipColor(label, mx, det) {
  const g = mx.gross_oi ?? 0;
  const n = mx.net_oi   ?? 0;
  const r = (mx.retention_ratio ?? 1) * 100;
  const s = det.skew_depth ?? 0;
  const h = mx.h1_doi_pct ?? 0;
  const l = mx.h1_liqshare_pct ?? 0;
  if (label === 'gross OI')    return g < 0.20 ? '#e05555' : null;
  if (label === 'net OI')      return n < 0.10 ? '#e05555' : n < 0.20 ? '#d4a017' : null;
  if (label === 'retention')   return r < 15   ? '#e05555' : r < 40   ? '#d4a017' : null;
  if (label === 'skew depth') {
    const z = mx.ip_zone;
    if (z === 'critical' || z === 'outside') return '#e05555';
    if (z === 'weak') return '#d4a017';
    return null;
  }
  if (label === 'H1 OI')       return h < 0    ? '#e05555' : h < 0.10  ? '#d4a017' : null;
  if (label === 'H1 liqshare') return l >= 10  ? '#e05555' : l >= 5    ? '#d4a017' : null;
  return null;
}

function h1LimbHtml(limbPct) {
  if (limbPct == null) return '—';
  const val = limbPct.toFixed(1) + '%';
  if (limbPct < -5)  return `<span style="color:#e05555">${val} · ликвидировали шортистов</span>`;
  if (limbPct > 5)   return `<span style="color:#3fb950">${val} · ликвидировали лонгистов</span>`;
  return val + ' · поровну';
}

function h1CvdHtml(sign) {
  if (sign === 1)  return '<span style="color:#3fb950">▲ суммарная лонговая агрессия</span>';
  if (sign === -1) return '<span style="color:#e05555">▼ суммарная шортовая агрессия</span>';
  return '— нейтрально';
}

function skewHint(sd, mx) {
  const z = mx?.ip_zone;
  if (z === 'critical') return 'implied_price ниже Pivot — стоп';
  if (z === 'outside')  return 'implied_price ниже зоны FVG — тест может уйти глубже';
  if (z === 'weak')     return 'implied_price в нижней части FVG — тест вглубь зоны';
  if (z === 'strong') {
    if (sd == null || sd <= 0) return 'implied_price выше инверсии';
    if (sd < 0.33) return 'implied_price в верхней части FVG — поддержка сильная';
    return 'implied_price в верхней части FVG';
  }
  return null;
}

function oiZoneHtml(below, fvg, inv, pctFn) {
  const cell = (lbl, val, col) => {
    const w = Math.min(100, Math.round((val ?? 0) * 100));
    return `<div class="oi-zone-cell">
      <div class="oi-zone-cell-label">${lbl}</div>
      <div class="oi-zone-cell-value" style="color:${col}">${pctFn(val)}</div>
      <div class="oi-zone-mini-bar"><div class="oi-zone-mini-fill" style="width:${w}%;background:${col}"></div></div>
    </div>`;
  };
  return `<div class="oi-zone-block">
    <div class="oi-zone-title">OI по зонам</div>
    <div class="oi-zone-grid">
      ${cell('перед FVG',       below, '#3fb950')}
      ${cell('внутри FVG',     fvg,   '#f0c020')}
      ${cell('свеча инверсии', inv,   '#d45010')}
    </div>
  </div>`;
}

// ── Построение отчёта ─────────────────────────────────────────
function buildReport(sc, det, mx) {
  const vColor = VERDICT_COLORS[sc.verdict] || '#888';
  const b      = sc.blocks;

  // Направление
  const dirClass = det.direction === 'long' ? 'badge-long' : 'badge-short';
  const dirText  = det.direction === 'long' ? 'LONG' : 'SHORT';

  // FVG размер
  const fvgSize = det.fvg.imb_range_pct < 0.15 ? 'малый'
                : det.fvg.imb_range_pct <= 0.40 ? 'средний' : 'большой';

  // ── Карточка вердикта ─────────────────────────────────────
  const verdictCard = `
    <div class="rc verdict-card" style="border-left-color: ${vColor}">
      <div class="score-row">
        <div class="score-num" style="color:${vColor}">${sc.total}<span class="score-denom">/100</span></div>
        <div class="verdict-label" style="color: ${vColor}">${sc.verdict}</div>
      </div>
      <div class="total-bar-track">
        <div class="total-bar-fill" style="width: ${sc.total}%; background: ${vColor}"></div>
      </div>
      <div class="meta-row">
        <span class="badge ${dirClass}">${dirText}</span>
        <span class="meta-tag">FVG <b>${det.fvg.lower_fvg} – ${det.fvg.upper_fvg}</b> · ${det.fvg.imb_range_pct}% (${fvgSize})</span>
        <span class="meta-tag">Pivot <b>${det.pivot.value}</b></span>
        <span class="meta-tag">Инверсия <b>${det.inversion.close}</b></span>
      </div>
    </div>`;

  // ── Итоговое заключение ───────────────────────────────────
  const conclusionCard = sc.conclusion ? `
    <div class="rc conclusion-card">
      <div class="section-title">Аналитическое заключение</div>
      <p class="conclusion-text">${sc.conclusion}</p>
    </div>` : '';

  // ── Стоп-флаги ────────────────────────────────────────────
  const stopHtml = sc.stopFlags.length > 0 ? `
    <div class="rc flags-card">
      <div class="section-title">Стоп-флаги</div>
      ${sc.stopFlags.map(f => `<div class="flag-item flag-stop">⛔ ${f}</div>`).join('')}
    </div>` : '';

  // ── Красные флаги ─────────────────────────────────────────
  const redHtml = sc.redFlags.length > 0 ? `
    <div class="rc flags-card">
      <div class="section-title">Предупреждения</div>
      ${sc.redFlags.map(f => `<div class="flag-item flag-red">⚠ ${f}</div>`).join('')}
    </div>` : '';

  // ── Блоки ─────────────────────────────────────────────────
  const BLOCKS = [
    { key:'block1', name:'Energy',           max:14 },
    { key:'block2', name:'OI Placement',     max:11 },
    { key:'block3', name:'OI Retention',     max:13 },
    { key:'block4', name:'Механика захвата', max:16 },
    { key:'block5', name:'Re-Auction',       max:13 },
    { key:'block6', name:'Geometry',         max:8  },
    { key:'block8', name:'Skew',             max:7  },
    { key:'block9', name:'H1 Snapshot',      max:18 },
  ];

  const blocksHtml = BLOCKS.map(bl => {
    const d     = b[bl.key];
    const color = scoreColor(d.score, bl.max);
    const width = Math.round(d.score / bl.max * 100);
    return `
      <div class="block-row">
        <div class="block-header">
          <span class="block-name">${bl.name}</span>
          <span class="block-score" style="color:${color}">${d.score} / ${bl.max}</span>
        </div>
        <div class="block-bar-track">
          <div class="block-bar-fill" style="width:${width}%; background:${color}"></div>
        </div>
        <div class="block-label">${d.label}</div>
        ${d.comment ? `<div class="block-comment">${d.comment}</div>` : ''}
        ${bl.key === 'block3' ? `<div class="block-disclaimer">⚠ Сторону снятия OI на M15 точно установить невозможно — логика оценивает только тайминг.</div>` : ''}
      </div>`;
  }).join('');

  const blocksCard = `
    <div class="rc">
      <div class="section-title">Блоки оценки</div>
      ${blocksHtml}
    </div>`;

  // ── Ожидаемый тест ────────────────────────────────────────
  const et = sc.expectedTest;
  const testColor = TEST_COLORS[et.level] || '#555';
  const testCard = `
    <div class="rc" style="border-left: 3px solid ${testColor}">
      <div class="section-title">Ожидаемый тест</div>
      <div class="test-level" style="color:${testColor}">${et.level}</div>
      <div class="test-range" style="color:${testColor}">${et.range}</div>
      <div class="test-comment">${et.comment}</div>
    </div>`;

  // ── Метрики ───────────────────────────────────────────────
  const pctStr = v => v != null ? (v * 100).toFixed(1) + '%' : '—';
  const metrics = [
    { label:'gross OI',    sub:'объём набранных позиций',       value: mx.gross_oi  + '%'           },
    { label:'net OI',      sub:'чистый остаток OI',             value: mx.net_oi    + '%'           },
    { label:'retention',   sub:'удержание позиции',             value: pctStr(mx.retention_ratio)   },
    { label:'↓+FVG zone',  sub:'OI ниже точки инверсии',       value: pctStr((mx.share_below??0)+(mx.share_fvg??0)) },
    { label:'FVG vol',     sub:'объём внутри зоны',             value: pctStr(mx.fvg_volume_share)  },
    { label:'skew depth',  sub:'отрыв implied_price от цены инверсии', value: det.skew_depth != null ? det.skew_depth.toFixed(3) : '—', hint: skewHint(det.skew_depth, mx) },
    { label:'H1 OI',       sub:'прирост позиций на H1',         value: mx.h1_doi_pct + '%'          },
    { label:'H1 liqshare', sub:'доля ликвидаций от объёма H1', value: mx.h1_liqshare_pct != null ? mx.h1_liqshare_pct.toFixed(2) + '%' : '—' },
    { label:'длина хода',  sub:'свечей от пивота до инверсии', value: mx.oi_window_count + ' св.'  },
  ];
  const metricsHtml = metrics.map(m => {
    const c = chipColor(m.label, mx, det);
    return `
    <div class="metric-chip">
      <div class="metric-chip-label">${m.label}</div>
      <div class="metric-chip-sub">${m.sub}</div>
      <div class="metric-chip-value" ${c ? `style="color:${c}"` : ''}>${m.value}</div>
      ${m.hint ? `<div class="metric-chip-hint">${m.hint}</div>` : ''}
    </div>`;
  }).join('');

  const metricsCard = `
    <div class="rc">
      <div class="section-title">Ключевые метрики</div>
      <div class="metrics-grid">${metricsHtml}</div>
    </div>`;

  // ── Параметры ─────────────────────────────────────────────
  const renderRow = ([k, sub, v]) =>
    `<div class="detail-row">
      <div class="detail-key-group">
        <span class="detail-key">${k}</span>
        ${sub ? `<span class="detail-subtitle">${sub}</span>` : ''}
      </div>
      <span class="detail-val">${v}</span>
    </div>`;

  const rowsBefore = [
    ['FVG',           null,                   `${det.fvg.lower_fvg} – ${det.fvg.upper_fvg}`],
    ['Инверсия',      null,                   `${det.inversion.ts} · close ${det.inversion.close}`],
    ['Pivot',         null,                   `${det.pivot.ts} · ${det.pivot.value}`],
    ['implied_price', 'цена расположения OI', det.inversion.implied_price ?? '—'],
    ['imb_range',     'глубина имбаланса',    det.fvg.imb_range_pct + '%'],
  ];
  const rowsAfter = [
    ['H1 limb', 'сторона ликвидаций H1', h1LimbHtml(mx.h1_limb_pct)],
    ['H1 CVD',  null,                    h1CvdHtml(mx.h1_cvd_sign)],
  ];
  const crossComment = (mx.share_fvg ?? 0) >= 0.5 && (mx.ip_zone === 'strong' || mx.ip_zone === 'weak')
    ? `<div class="block-disclaimer" style="margin:6px 0 2px">Доля OI внутри имбаланса и implied_price совпадают по зоне — OI будет защищать уровень при тесте.</div>`
    : '';

  const detailsHtml =
    rowsBefore.map(renderRow).join('') +
    oiZoneHtml(mx.share_below, mx.share_fvg, mx.share_inv, pctStr) +
    crossComment +
    rowsAfter.map(renderRow).join('');

  const detailsCard = `
    <div class="rc">
      <div class="section-title">Параметры</div>
      ${detailsHtml}
    </div>`;

  const saveBtn = `<button class="btn-save" id="btnSave" onclick="openSaveModal()">Сохранить сетап</button>`;
  return verdictCard + conclusionCard + stopHtml + redHtml + blocksCard + testCard + metricsCard + detailsCard + saveBtn;
}

// ── Запуск анализа ────────────────────────────────────────────
function runAnalysis() {
  const m15Text  = document.getElementById('m15Input').value;
  const h1Text   = document.getElementById('h1Input').value;
  const errorsEl = document.getElementById('errors');
  const reportEl = document.getElementById('report');

  errorsEl.classList.remove('visible');
  reportEl.classList.remove('visible');
  reportEl.innerHTML = '';

  const parsed = parseInput(m15Text, h1Text);
  if (parsed.errors.length > 0) {
    errorsEl.innerHTML = parsed.errors.map(e => `<p>⚠ ${e}</p>`).join('');
    errorsEl.classList.add('visible');
    return;
  }

  const det = detect(parsed.m15);
  if (!det.ok) {
    errorsEl.innerHTML = det.errors.map(e => `<p>⚠ ${e}</p>`).join('');
    errorsEl.classList.add('visible');
    return;
  }

  const mx = computeMetrics(parsed.m15, parsed.h1, det);
  const sc = computeScore(parsed.m15, parsed.h1, det, mx);

  _lastSc = sc; _lastDet = det; _lastMx = mx;

  reportEl.innerHTML = buildReport(sc, det, mx);
  reportEl.classList.add('visible');
  reportEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Сохранение и экспорт ─────────────────────────────────────
function openSaveModal() {
  if (!_lastSc) return;
  document.getElementById('saveOutcome').value = '';
  document.getElementById('saveRR').value = '';
  document.getElementById('saveRRRow').style.display = 'none';
  document.getElementById('saveSeniorCtx').value = '';
  document.getElementById('saveTestDepth').value = '';
  document.getElementById('saveNotes').value = '';
  document.getElementById('saveModal').classList.add('visible');
}

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('visible');
}

function onOutcomeChange() {
  const v = document.getElementById('saveOutcome').value;
  document.getElementById('saveRRRow').style.display = v === 'тейк' ? 'flex' : 'none';
}

function confirmSave() {
  const outcome    = document.getElementById('saveOutcome').value;
  const rr         = document.getElementById('saveRR').value.trim();
  const seniorCtx  = document.getElementById('saveSeniorCtx').value;
  const testDepth  = document.getElementById('saveTestDepth').value;
  const notes      = document.getElementById('saveNotes').value.trim();
  if (!outcome || !testDepth) { alert('Укажите исход и глубину теста'); return; }

  const sc = _lastSc, det = _lastDet, mx = _lastMx;
  const b  = sc.blocks;
  const setup = {
    saved_at: new Date().toISOString(),
    outcome,
    rr: outcome === 'тейк' ? (rr || null) : null,
    senior_context: seniorCtx || null,
    actual_test: testDepth,
    notes: notes || null,
    // Идентификация
    direction: det.direction,
    inversion_ts: det.inversion.ts,
    inversion_close: det.inversion.close,
    pivot_ts: det.pivot.ts,
    pivot_price: det.pivot.value,
    implied_price: det.inversion.implied_price ?? null,
    fvg_lower: det.fvg.lower_fvg,
    fvg_upper: det.fvg.upper_fvg,
    imb_range_pct: det.fvg.imb_range_pct,
    skew_depth: det.skew_depth ?? null,
    // Скоринг
    total_score: sc.total,
    verdict: sc.verdict,
    stop_flags: sc.stopFlags,
    red_flags: sc.redFlags,
    expected_test_level: sc.expectedTest.level,
    expected_test_range: sc.expectedTest.range,
    // Блоки
    block1: b.block1.score, block2: b.block2.score,
    block3: b.block3.score, block4: b.block4.score,
    block4_scenario: b.block4.label,
    block5: b.block5.score, block6: b.block6.score,
    block8: b.block8.score, block9: b.block9.score,
    // Метрики
    gross_oi: mx.gross_oi, net_oi: mx.net_oi,
    retention_ratio: mx.retention_ratio,
    share_below: mx.share_below, share_fvg: mx.share_fvg, share_inv: mx.share_inv,
    fvg_volume_share: mx.fvg_volume_share,
    h1_doi_pct: mx.h1_doi_pct, h1_liqshare_pct: mx.h1_liqshare_pct,
    h1_limb_pct: mx.h1_limb_pct, h1_cvd_sign: mx.h1_cvd_sign,
    oi_window_count: mx.oi_window_count,
  };

  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  all.push(setup);
  localStorage.setItem('btc_fvg_setups', JSON.stringify(all));
  closeSaveModal();
  updateExportBtn();
  updateSetupsBtn();
  const btn = document.getElementById('btnSave');
  if (btn) { btn.textContent = '✓ Сохранено'; setTimeout(() => { btn.textContent = 'Сохранить сетап'; }, 2000); }
}

function exportSetups() {
  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  if (!all.length) { alert('Нет сохранённых сетапов'); return; }
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `fvg_setups_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function updateExportBtn() {
  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  const btn = document.getElementById('btnExport');
  if (btn) btn.textContent = `Экспорт (${all.length})`;
}

function updateSetupsBtn() {
  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  const btn = document.getElementById('btnSetups');
  if (btn) btn.textContent = `Сетапы (${all.length})`;
}

function openSetupsModal() {
  renderSetupsList();
  document.getElementById('setupsModal').classList.add('visible');
}

function closeSetupsModal() {
  document.getElementById('setupsModal').classList.remove('visible');
}

function renderSetupsList() {
  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  const container  = document.getElementById('setupsList');
  const deleteBtn  = document.getElementById('btnDeleteAll');
  const titleEl    = document.getElementById('setupsModalTitle');
  titleEl.textContent = `Сохранённые сетапы (${all.length})`;

  if (all.length === 0) {
    container.innerHTML = '<div class="setups-empty">Нет сохранённых сетапов</div>';
    deleteBtn.style.display = 'none';
    return;
  }

  deleteBtn.style.display = '';
  const vColors = {
    'Сильный сетап':'#2ea043','Рабочий сетап':'#3fb950',
    'Стандартная инверсия':'#d4a017','Ослабленная инверсия':'#e38a11','Не брать':'#c0392b',
  };
  container.innerHTML = all.map((s, i) => {
    const d = new Date(s.saved_at);
    const date = isNaN(d) ? '—' : d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
    const dir  = s.direction === 'long' ? 'LONG' : 'SHORT';
    const dirColor = s.direction === 'long' ? '#3fb950' : '#e05555';
    const vColor   = vColors[s.verdict] || '#888';
    const outcome  = s.outcome ? ` · ${s.outcome}` : '';
    return `
      <div class="setup-item">
        <div class="setup-item-info">
          <div>
            <span class="setup-item-dir" style="color:${dirColor}">${dir}</span>
            <span class="setup-item-score" style="color:${vColor}">${s.total_score}/100 · ${s.verdict}${outcome}</span>
          </div>
          <div class="setup-item-date">${s.inversion_ts || '—'} · сохранён ${date}</div>
        </div>
        <button class="btn-delete-setup" onclick="deleteSetup(${i})" title="Удалить">✕</button>
      </div>`;
  }).join('');
}

function deleteSetup(index) {
  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  all.splice(index, 1);
  localStorage.setItem('btc_fvg_setups', JSON.stringify(all));
  updateExportBtn();
  updateSetupsBtn();
  renderSetupsList();
}

function deleteAllSetups() {
  const all = JSON.parse(localStorage.getItem('btc_fvg_setups') || '[]');
  if (!all.length) return;
  if (!confirm(`Удалить все ${all.length} сетапов? Отменить нельзя.`)) return;
  localStorage.removeItem('btc_fvg_setups');
  updateExportBtn();
  updateSetupsBtn();
  renderSetupsList();
}

updateExportBtn();
updateSetupsBtn();
</script>

</body>
</html>
